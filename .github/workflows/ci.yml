name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon_key_placeholder
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_URL: http://localhost:4444
          CRON_SECRET: ci_cron_secret_placeholder
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          STRIPE_STARTER_PRICE_ID: price_ci_starter
          STRIPE_PRO_PRICE_ID: price_ci_pro
          STRIPE_ENTERPRISE_PRICE_ID: price_ci_enterprise
        run: npm run build
