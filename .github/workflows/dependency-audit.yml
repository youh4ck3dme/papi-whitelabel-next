name: Dependency Audit

on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run audit (JSON)
        run: npm audit --json > audit.json || true

      - name: Print vulnerability summary
        run: |
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('audit.json','utf8'));const v=a.metadata?.vulnerabilities||{};console.log('vuln-summary',v);if((v.critical||0)>0){process.exitCode=1;}"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json
