name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Scan for common secret patterns
        run: |
          set -euo pipefail
          PATTERN='sk_live_[A-Za-z0-9]+|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|BEGIN PRIVATE KEY|xox[baprs]-[A-Za-z0-9-]+'
          if grep -RInE --exclude-dir=.git --exclude-dir=node_modules --exclude='*.md' --exclude='.env.example' --exclude='secret-scan.yml' "$PATTERN" .; then
            echo "Potential secret detected"
            exit 1
          fi
          echo "No high-confidence secrets detected"
